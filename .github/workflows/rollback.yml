name: Rollback

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        type: choice
        options:
          - dev
          - staging
          - prod
      target:
        description: Service scope
        required: true
        type: choice
        options:
          - back
          - front
          - both
        default: both
      version:
        description: Optional tag to restore
        required: false
        default: ""

concurrency:
  group: rollback-${{ inputs.environment }}
  cancel-in-progress: false

jobs:
  rollback:
    runs-on: [self-hosted, linux, x64]
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v6

      - name: Mark scripts executable
        run: |
          chmod +x scripts/*.sh

      - name: Verify optional runner hostname
        run: |
          set -euo pipefail
          if [ -n "${{ vars.EXPECTED_HOSTNAME || '' }}" ]; then
            host="$(hostname -s || hostname)"
            if [ "$host" != "${{ vars.EXPECTED_HOSTNAME }}" ]; then
              echo "Refusing to rollback on unexpected host: $host" >&2
              exit 1
            fi
          fi

      - name: Validate required env for compose
        env:
          APP_DOMAIN: ${{ vars.APP_DOMAIN }}
          BACK_IMAGE: ${{ vars.BACK_IMAGE }}
          FRONT_IMAGE: ${{ vars.FRONT_IMAGE }}
        run: |
          ./scripts/validate-required-env.sh compose

      - name: Write compose env
        env:
          COMPOSE_PROJECT_NAME: ${{ vars.COMPOSE_PROJECT_NAME || 'starter' }}
          DEPLOY_ENV: ${{ inputs.environment }}
          BACK_IMAGE: ${{ vars.BACK_IMAGE }}
          BACK_IMAGE_TAG: ${{ vars.BACK_IMAGE_TAG_DEFAULT || 'latest' }}
          FRONT_IMAGE: ${{ vars.FRONT_IMAGE }}
          FRONT_IMAGE_TAG: ${{ vars.FRONT_IMAGE_TAG_DEFAULT || 'latest' }}
          MYSQL_VERSION: ${{ vars.MYSQL_VERSION || '8.4.9' }}
          REDIS_VERSION: ${{ vars.REDIS_VERSION || '8.6.3-alpine' }}
          NGINX_VERSION: ${{ vars.NGINX_VERSION || '1.30.0-alpine' }}
          MERCURE_VERSION: ${{ vars.MERCURE_VERSION || 'v0.23.5' }}
          GRAFANA_VERSION: ${{ vars.GRAFANA_VERSION || '13.0.1' }}
          PROMETHEUS_VERSION: ${{ vars.PROMETHEUS_VERSION || 'v3.11.3' }}
          LOKI_VERSION: ${{ vars.LOKI_VERSION || '3.7.1' }}
          ALLOY_VERSION: ${{ vars.ALLOY_VERSION || 'v1.16.1' }}
          CADVISOR_VERSION: ${{ vars.CADVISOR_VERSION || 'v0.55.1' }}
          MYSQL_DATABASE: ${{ vars.MYSQL_DATABASE || 'app' }}
          MYSQL_USER: ${{ vars.MYSQL_USER || 'app' }}
          APP_DOMAIN: ${{ vars.APP_DOMAIN }}
          HOST_HTTP_PORT: ${{ vars.HOST_HTTP_PORT || '80' }}
          HOST_HTTPS_PORT: ${{ vars.HOST_HTTPS_PORT || '443' }}
          TLS_CERT_PATH: ${{ vars.TLS_CERT_PATH || '/etc/nginx/certs/fullchain.pem' }}
          TLS_KEY_PATH: ${{ vars.TLS_KEY_PATH || '/etc/nginx/certs/privkey.pem' }}
          BACK_HTTP_PORT: ${{ vars.BACK_HTTP_PORT || '8080' }}
          BACK_HEALTH_PATH: ${{ vars.BACK_HEALTH_PATH || '/api/health' }}
          FRONT_HTTP_PORT: ${{ vars.FRONT_HTTP_PORT || '3000' }}
          WORKER_DEFAULT_COMMAND: ${{ vars.WORKER_DEFAULT_COMMAND || 'php bin/console messenger:consume async --time-limit=3600 --memory-limit=256M' }}
          WORKER_MAIL_COMMAND: ${{ vars.WORKER_MAIL_COMMAND || 'php bin/console messenger:consume async_mail --time-limit=3600 --memory-limit=256M' }}
          WORKER_OUTBOX_COMMAND: ${{ vars.WORKER_OUTBOX_COMMAND || 'php bin/console messenger:consume async_outbox --time-limit=3600 --memory-limit=256M' }}
          SCHEDULER_COMMAND: ${{ vars.SCHEDULER_COMMAND || '/usr/local/bin/scheduler-loop.sh' }}
          SCHEDULER_TICK_COMMAND: ${{ vars.SCHEDULER_TICK_COMMAND || 'php bin/console app:schedule:run' }}
          MERCURE_CORS_ALLOWED_ORIGINS: ${{ vars.MERCURE_CORS_ALLOWED_ORIGINS || format('https://{0}', vars.APP_DOMAIN) }}
          MERCURE_PUBLISH_ALLOWED_ORIGINS: ${{ vars.MERCURE_PUBLISH_ALLOWED_ORIGINS || format('https://{0}', vars.APP_DOMAIN) }}
          ENABLE_OBSERVABILITY: ${{ vars.ENABLE_OBSERVABILITY || '0' }}
          GRAFANA_AUTH_BASIC_REALM: ${{ vars.GRAFANA_AUTH_BASIC_REALM || 'off' }}
          PROMETHEUS_RETENTION: ${{ vars.PROMETHEUS_RETENTION || '7d' }}
          LOKI_RETENTION: ${{ vars.LOKI_RETENTION || '168h' }}
          ENABLE_MEDIA_EDGE: ${{ vars.ENABLE_MEDIA_EDGE || '0' }}
          MEDIA_EDGE_BASE_URL: ${{ vars.MEDIA_EDGE_BASE_URL || '' }}
        run: |
          ./scripts/render-compose-env.sh .env

      - name: Write runtime env
        env:
          APP_DOMAIN: ${{ vars.APP_DOMAIN }}
          APP_ENV: ${{ vars.APP_ENV || 'prod' }}
          APP_DEBUG: ${{ vars.APP_DEBUG || '0' }}
          APP_SECRET: ${{ secrets.APP_SECRET }}
          MYSQL_DATABASE: ${{ vars.MYSQL_DATABASE || 'app' }}
          MYSQL_USER: ${{ vars.MYSQL_USER || 'app' }}
          MYSQL_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}
          MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
          REDIS_URL: ${{ vars.REDIS_URL || 'redis://redis:6379' }}
          MESSENGER_TRANSPORT_DSN: ${{ vars.MESSENGER_TRANSPORT_DSN || 'redis://redis:6379/messages' }}
          MESSENGER_MAIL_TRANSPORT_DSN: ${{ vars.MESSENGER_MAIL_TRANSPORT_DSN || 'redis://redis:6379/messages/mail' }}
          MESSENGER_OUTBOX_TRANSPORT_DSN: ${{ vars.MESSENGER_OUTBOX_TRANSPORT_DSN || 'redis://redis:6379/messages/outbox' }}
          MESSENGER_FAILED_TRANSPORT_DSN: ${{ vars.MESSENGER_FAILED_TRANSPORT_DSN || 'redis://redis:6379/messages/failed' }}
          MERCURE_JWT_SECRET: ${{ secrets.MERCURE_JWT_SECRET }}
          MAILER_DSN: ${{ secrets.MAILER_DSN || 'null://null' }}
          MAILER_FROM: ${{ vars.MAILER_FROM || 'no-reply@example.test' }}
          APP_FRONT_BASE_URL: ${{ vars.APP_FRONT_BASE_URL || format('https://{0}', vars.APP_DOMAIN) }}
          DEFAULT_URI: ${{ vars.DEFAULT_URI || format('https://{0}', vars.APP_DOMAIN) }}
          BACK_HTTP_PORT: ${{ vars.BACK_HTTP_PORT || '8080' }}
          API_BASE_URL: ${{ vars.API_BASE_URL || format('http://back:{0}/api', vars.BACK_HTTP_PORT || '8080') }}
          MEDIA_EDGE_BASE_URL: ${{ vars.MEDIA_EDGE_BASE_URL || '' }}
          APP_MEDIA_PUBLIC_BASE_URL: ${{ vars.APP_MEDIA_PUBLIC_BASE_URL || format('https://{0}/uploads/media', vars.APP_DOMAIN) }}
          NEXT_PUBLIC_APP_URL: ${{ vars.NEXT_PUBLIC_APP_URL || format('https://{0}', vars.APP_DOMAIN) }}
          NEXT_PUBLIC_MERCURE_URL: ${{ vars.NEXT_PUBLIC_MERCURE_URL || format('https://{0}/.well-known/mercure', vars.APP_DOMAIN) }}
          NEXT_PUBLIC_MERCURE_DISABLED: ${{ vars.NEXT_PUBLIC_MERCURE_DISABLED || 'false' }}
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ vars.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY || '' }}
          NEXT_PUBLIC_MEDIA_BASE_URL: ${{ vars.NEXT_PUBLIC_MEDIA_BASE_URL || vars.MEDIA_EDGE_BASE_URL || format('https://{0}/uploads/media', vars.APP_DOMAIN) }}
          NEXT_PUBLIC_MEDIA_UPLOAD_BASE_URL: ${{ vars.NEXT_PUBLIC_MEDIA_UPLOAD_BASE_URL || format('https://{0}', vars.APP_DOMAIN) }}
          NEXT_PUBLIC_VAPID_PUBLIC_KEY: ${{ vars.NEXT_PUBLIC_VAPID_PUBLIC_KEY || '' }}
          B2_ENDPOINT: ${{ vars.B2_ENDPOINT || '' }}
          B2_BUCKET: ${{ vars.B2_BUCKET || '' }}
          B2_PREFIX: ${{ vars.B2_PREFIX || '' }}
          JWT_SECRET_KEY: ${{ vars.JWT_SECRET_KEY || '%kernel.project_dir%/config/jwt/private.pem' }}
          JWT_PUBLIC_KEY: ${{ vars.JWT_PUBLIC_KEY || '%kernel.project_dir%/config/jwt/public.pem' }}
          JWT_PASSPHRASE: ${{ secrets.JWT_PASSPHRASE || 'change-me' }}
          JWT_PRIVATE_KEY_PEM: ${{ secrets.JWT_PRIVATE_KEY_PEM || '' }}
          JWT_PUBLIC_KEY_PEM: ${{ secrets.JWT_PUBLIC_KEY_PEM || '' }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY || '' }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET || '' }}
          GRAFANA_ADMIN_USER: ${{ vars.GRAFANA_ADMIN_USER || 'admin' }}
          GRAFANA_ADMIN_PASSWORD: ${{ secrets.GRAFANA_ADMIN_PASSWORD || 'change-me-observe' }}
          GRAFANA_SECRET_KEY: ${{ secrets.GRAFANA_SECRET_KEY || 'change-me-observe' }}
        run: |
          set -euo pipefail
          ./scripts/validate-required-env.sh runtime
          if [ "${{ vars.ENABLE_OBSERVABILITY || '0' }}" = "1" ]; then
            ./scripts/validate-required-env.sh observability
          fi
          ./scripts/render-runtime-env.sh "${{ inputs.environment }}"

      - name: Write Grafana htpasswd
        env:
          GRAFANA_HTPASSWD: ${{ secrets.GRAFANA_HTPASSWD || '' }}
          GRAFANA_BASIC_AUTH_USER: ${{ vars.GRAFANA_ADMIN_USER || 'admin' }}
          GRAFANA_BASIC_AUTH_PASSWORD: ${{ secrets.GRAFANA_ADMIN_PASSWORD || 'change-me-observe' }}
        run: |
          ./scripts/render-grafana-htpasswd.sh

      - name: Rollback
        env:
          DEPLOY_ENV: ${{ inputs.environment }}
          RELEASE_STATE_ROOT: ${{ vars.RELEASE_STATE_ROOT || '' }}
        run: |
          ./scripts/rollback.sh "${{ inputs.target }}" "${{ inputs.version }}"

      - name: Clean generated runtime files
        if: always()
        run: |
          rm -f .env "env/.env.${{ inputs.environment }}" env/grafana.htpasswd
