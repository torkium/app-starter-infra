x-back-dev-volumes: &back-dev-volumes
  - ${BACK_BUILD_CONTEXT:-../app-starter-back}:/app
  - /app/vendor
  - /app/var/cache
  - /app/var/log
  - media_uploads:/app/var/media/uploads
  - ${BACK_BUILD_CONTEXT:-../app-starter-back}/config/jwt:/run/my_app-secrets/jwt:ro

services:
  back:
    build:
      context: ${BACK_BUILD_CONTEXT:-../app-starter-back}
      dockerfile: ${BACK_DOCKERFILE:-Dockerfile}
      args:
        INSTALL_DEV_DEPS: "1"
    volumes:
      *back-dev-volumes

  worker_default:
    build:
      context: ${BACK_BUILD_CONTEXT:-../app-starter-back}
      dockerfile: ${BACK_DOCKERFILE:-Dockerfile}
      args:
        INSTALL_DEV_DEPS: "1"
    command: php bin/console messenger:consume async --time-limit=60 --memory-limit=256M
    volumes:
      *back-dev-volumes

  worker_mail:
    build:
      context: ${BACK_BUILD_CONTEXT:-../app-starter-back}
      dockerfile: ${BACK_DOCKERFILE:-Dockerfile}
      args:
        INSTALL_DEV_DEPS: "1"
    command: php bin/console messenger:consume async_mail --time-limit=60 --memory-limit=256M
    volumes:
      *back-dev-volumes

  worker_outbox:
    build:
      context: ${BACK_BUILD_CONTEXT:-../app-starter-back}
      dockerfile: ${BACK_DOCKERFILE:-Dockerfile}
      args:
        INSTALL_DEV_DEPS: "1"
    command: php bin/console messenger:consume async_outbox --time-limit=60 --memory-limit=256M
    volumes:
      *back-dev-volumes

  scheduler:
    build:
      context: ${BACK_BUILD_CONTEXT:-../app-starter-back}
      dockerfile: ${BACK_DOCKERFILE:-Dockerfile}
      args:
        INSTALL_DEV_DEPS: "1"
    environment:
      SCHEDULER_SLEEP_SECONDS: "5"
    volumes:
      - ${BACK_BUILD_CONTEXT:-../app-starter-back}:/app
      - /app/vendor
      - /app/var/cache
      - /app/var/log
      - media_uploads:/app/var/media/uploads
      - ./scripts/scheduler-loop.sh:/usr/local/bin/scheduler-loop.sh:ro
      - ${BACK_BUILD_CONTEXT:-../app-starter-back}/config/jwt:/run/my_app-secrets/jwt:ro

  front:
    build:
      context: ${FRONT_BUILD_CONTEXT:-../app-starter-front}
      dockerfile: ${FRONT_DOCKERFILE:-Dockerfile}
      target: dev
    command: npm run dev
    volumes:
      - ${FRONT_BUILD_CONTEXT:-../app-starter-front}:/app
      - /app/node_modules
      - /app/.next

  nginx:
    volumes:
      - ./env/grafana.htpasswd:/etc/nginx/grafana.htpasswd:ro
